apiVersion: v1
kind: Secret
metadata:
  name: temporal-worker-secret
  namespace: temporal-workers
type: Opaque
stringData:
  # UNUSED for the self-hosted plaintext POC — intentionally blank.
  # When you move to Temporal Cloud (or enable API-key auth), set this and the
  # worker will automatically connect over TLS with it. The Deployment reads it
  # as optional, so leaving it empty is fine.
  TEMPORAL_API_KEY: ""
